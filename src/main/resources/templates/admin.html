<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abrigo São Vicente de Paulo de Ilhéus - Cuidado e Amor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" >
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../static/css/estilos.css" th:href="@{/css/estilos.css}">
</head>
<body>

    <header>
        <nav class="navbar navbar-expand-lg fixed-top">
            <div class="container align-items-center">

                <!-- TÍTULO -->
                <a class="navbar-brand d-flex align-items-center" href="#">
                    <img src="../static/image/logo.svg" th:src="@{/image/logo.svg}" alt="logo" width="40" height="40" class="me-2">
                    <div class="d-flex flex-column text-start">
                        <span class="fw-bold lh-1 text-dark" style="font-size: 1.0rem;">ABRIGO SÃO VICENTE DE PAULO DE ILHÉUS</span>
                        <small class="text-muted" style="font-size: 1rem; letter-spacing: 1px;">CUIDADO & AMOR</small>
                    </div>
                </a>

                <!-- MENU -->
                <button class="navbar-toggler" mt-2 mt-lg-0 type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Alternar navegação">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto align-items-lg-center">
                        <li class="nav-item"><a class="nav-link active px-3" href="#">Home</a></li>
                        <li class="nav-item"><a class="nav-link px-3" href="#">Sobre Nós</a></li>
                        <li class="nav-item"><a class="nav-link px-3" href="#">Como Ajudar</a></li>
                        <li class="nav-item"><a class="nav-link px-3 me-2" href="#">Contato</a></li>
                        <li class="nav-item mt-2 mt-lg-0">
                            <a class="btn btn-custom-green px-4 py-2 rounded-pill fw-bold" href="#">DOAR AGORA</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <div style="margin-top: 75px;"></div>

    <div class="container mt-4">

        <div th:if="${param.sucesso}" class="alert alert-success text-center" role="alert">
            <i class="bi bi-check-circle-fill me-1"></i>Alteração salva com sucesso!
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Painel de Controle</h1>
            <a th:href="@{/logout}" class="btn btn-danger">Sair</a>
        </div>

        <div class="card mb-4">
            <div class="card-header">Banner Principal (Homepage)</div>
            <div class="card-body">
                <form th:action="@{/admin}" method="POST" class="mb-3">
                    <input type="hidden" name="chave" value="home.titulo">
                    <label class="form-label">Título do Banner:</label>
                    <div class="input-group">
                        <textarea name="texto" class="form-control" rows="2" th:text="${textos['home.titulo']}"></textarea>
                        <button class="btn btn-custom-blue" type="submit">Salvar</button>
                    </div>
                </form>

                <form th:action="@{/admin}" method="POST">
                    <input type="hidden" name="chave" value="home.descricao">
                    <label class="form-label">Descrição do Banner:</label>
                    <div class="input-group">
                        <textarea name="texto" class="form-control" rows="3" th:text="${textos['home.descricao']}"></textarea>
                        <button class="btn btn-custom-blue" type="submit">Salvar</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-header">Seção: Nossos Cuidados</div>
            <div class="card-body">
                <form th:action="@{/admin}" method="POST" class="mb-3">
                    <input type="hidden" name="chave" value="servicos.saude.titulo">
                    <label class="form-label">Serviço 1 - Título:</label>
                    <div class="input-group">
                        <input type="text" name="texto" class="form-control" th:value="${textos['servicos.saude.titulo']}">
                        <button class="btn btn-custom-blue" type="submit">Salvar</button>
                    </div>
                </form>
                <form th:action="@{/admin}" method="POST" class="mb-4">
                    <input type="hidden" name="chave" value="servicos.saude.texto">
                    <label class="form-label">Serviço 1 - Descrição:</label>
                    <div class="input-group">
                        <textarea name="texto" class="form-control" rows="2" th:text="${textos['servicos.saude.texto']}"></textarea>
                        <button class="btn btn-custom-blue" type="submit">Salvar</button>
                    </div>
                </form>

                <form th:action="@{/admin}" method="POST" class="mb-3">
                    <input type="hidden" name="chave" value="servicos.lazer.titulo">
                    <label class="form-label">Serviço 2 - Título:</label>
                    <div class="input-group">
                        <input type="text" name="texto" class="form-control" th:value="${textos['servicos.lazer.titulo']}">
                        <button class="btn btn-custom-blue" type="submit">Salvar</button>
                    </div>
                </form>
                <form th:action="@{/admin}" method="POST" class="mb-4">
                    <input type="hidden" name="chave" value="servicos.lazer.texto">
                    <label class="form-label">Serviço 2 - Descrição:</label>
                    <div class="input-group">
                        <textarea name="texto" class="form-control" rows="2" th:text="${textos['servicos.lazer.texto']}"></textarea>
                        <button class="btn btn-custom-blue" type="submit">Salvar</button>
                    </div>
                </form>

                <form th:action="@{/admin}" method="POST" class="mb-3">
                    <input type="hidden" name="chave" value="servicos.convivencia.titulo">
                    <label class="form-label">Serviço 3 - Título:</label>
                    <div class="input-group">
                        <input type="text" name="texto" class="form-control" th:value="${textos['servicos.convivencia.titulo']}">
                        <button class="btn btn-custom-blue" type="submit">Salvar</button>
                    </div>
                </form>
                <form th:action="@{/admin}" method="POST">
                    <input type="hidden" name="chave" value="servicos.convivencia.texto">
                    <label class="form-label">Serviço 3 - Descrição:</label>
                    <div class="input-group">
                        <textarea name="texto" class="form-control" rows="2" th:text="${textos['servicos.convivencia.texto']}"></textarea>
                        <button class="btn btn-custom-blue" type="submit">Salvar</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-header">Seção: Como Ajudar</div>
            <div class="card-body">
                <form th:action="@{/admin}" method="POST" class="mb-3">
                    <input type="hidden" name="chave" value="ajudar.doar.titulo">
                    <label class="form-label">Bloco Doador - Título:</label>
                    <div class="input-group">
                        <input type="text" name="texto" class="form-control" th:value="${textos['ajudar.doar.titulo']}">
                        <button class="btn btn-custom-blue" type="submit">Salvar</button>
                    </div>
                </form>
                <form th:action="@{/admin}" method="POST" class="mb-4">
                    <input type="hidden" name="chave" value="ajudar.doar.texto">
                    <label class="form-label">Bloco Doador - Descrição:</label>
                    <div class="input-group">
                        <textarea name="texto" class="form-control" rows="2" th:text="${textos['ajudar.doar.texto']}"></textarea>
                        <button class="btn btn-custom-blue" type="submit">Salvar</button>
                    </div>
                </form>

                <form th:action="@{/admin}" method="POST" class="mb-3">
                    <input type="hidden" name="chave" value="ajudar.voluntario.titulo">
                    <label class="form-label">Bloco Voluntário - Título:</label>
                    <div class="input-group">
                        <input type="text" name="texto" class="form-control" th:value="${textos['ajudar.voluntario.titulo']}">
                        <button class="btn btn-custom-blue" type="submit">Salvar</button>
                    </div>
                </form>
                <form th:action="@{/admin}" method="POST">
                    <input type="hidden" name="chave" value="ajudar.voluntario.texto">
                    <label class="form-label">Bloco Voluntário - Descrição:</label>
                    <div class="input-group">
                        <textarea name="texto" class="form-control" rows="2" th:text="${textos['ajudar.voluntario.texto']}"></textarea>
                        <button class="btn btn-custom-blue" type="submit">Salvar</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-header">Seção: Redes Sociais</div>
            <div class="card-body">
                <form th:action="@{/admin}" method="POST" class="mb-3">
                    <input type="hidden" name="chave" value="redes.titulo">
                    <label class="form-label">Redes Sociais - Título:</label>
                    <div class="input-group">
                        <input type="text" name="texto" class="form-control" th:value="${textos['redes.titulo']}">
                        <button class="btn btn-custom-blue" type="submit">Salvar</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card">
            <div class="card-header">Contatos e Rodapé</div>
            <div class="card-body">
                <form th:action="@{/admin}" method="POST" class="mb-3">
                    <input type="hidden" name="chave" value="contato.telefone">
                    <label class="form-label">Telefone:</label>
                    <div class="input-group">
                        <input type="text" name="texto" class="form-control" th:value="${textos['contato.telefone']}">
                        <button class="btn btn-custom-blue" type="submit">Salvar</button>
                    </div>
                </form>

                <form th:action="@{/admin}" method="POST" class="mb-3">
                    <input type="hidden" name="chave" value="contato.email">
                    <label class="form-label">E-mail:</label>
                    <div class="input-group">
                        <input type="text" name="texto" class="form-control" th:value="${textos['contato.email']}">
                        <button class="btn btn-custom-blue" type="submit">Salvar</button>
                    </div>
                </form>

                <form th:action="@{/admin}" method="POST" class="mb-3">
                    <input type="hidden" name="chave" value="contato.endereco">
                    <label class="form-label">Endereço:</label>
                    <div class="input-group">
                        <input type="text" name="texto" class="form-control" th:value="${textos['contato.endereco']}">
                        <button class="btn btn-custom-blue" type="submit">Salvar</button>
                    </div>
                </form>

                <form th:action="@{/admin}" method="POST">
                    <input type="hidden" name="chave" value="footer.sobre.texto">
                    <label class="form-label">Texto do Rodapé:</label>
                    <div class="input-group">
                        <textarea name="texto" class="form-control" rows="2" th:text="${textos['footer.sobre.texto']}"></textarea>
                        <button class="btn btn-custom-blue" type="submit">Salvar</button>
                    </div>
                </form>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
