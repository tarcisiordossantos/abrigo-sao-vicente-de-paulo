<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abrigo São Vicente de Paulo de Ilhéus - Cuidado e Amor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" >
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../static/css/estilos.css" th:href="@{/css/estilos.css}">
</head>
<body>

    <header>
        <nav class="navbar navbar-expand-lg fixed-top">
            <div class="container align-items-center">

                <!-- TÍTULO -->
                <a class="navbar-brand d-flex align-items-center" href="#">
                    <img src="../static/image/logo.svg" th:src="@{/image/logo.svg}" alt="logo" width="40" height="40" class="me-2">
                    <div class="d-flex flex-column text-start">
                        <span class="fw-bold lh-1 text-dark" style="font-size: 1.0rem;">ABRIGO SÃO VICENTE DE PAULO DE ILHÉUS</span>
                        <small class="text-muted" style="font-size: 1rem; letter-spacing: 1px;">CUIDADO & AMOR</small>
                    </div>
                </a>

                <!-- MENU -->
                <button class="navbar-toggler" mt-2 mt-lg-0 type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Alternar navegação">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto align-items-lg-center">
                        <li class="nav-item"><a class="nav-link active px-3" href="#">Home</a></li>
                        <li class="nav-item"><a class="nav-link px-3" href="#">Sobre Nós</a></li>
                        <li class="nav-item"><a class="nav-link px-3" href="#">Como Ajudar</a></li>
                        <li class="nav-item"><a class="nav-link px-3 me-2" href="#">Contato</a></li>
                        <li class="nav-item mt-2 mt-lg-0">
                            <a class="btn btn-custom-green px-4 py-2 rounded-pill fw-bold" href="#">DOAR AGORA</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <div style="margin-top: 75px;"></div>


    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-4 card shadow p-4">
                <div th:if="${param.erro}" class="alert alert-danger text-center small py-2" role="alert">
                    Senha incorreta! Tente novamente.
                </div>
                <form th:action="@{/login}" method="POST">
                    <label for="senha"> Senha: </label>
                    <input class="form-control mb-3" type="password" id="senha" name="senha" placeholder="Digite sua senha">
                    <button class="btn btn-custom-blue w-100 fw-bold py-2" type="submit">Acessar</button>
                </form>
            </div>
        </div>
    </div>

    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
